name: Weekly LNM AOR refresh

# The D1 LNM is published weekly (typically Tuesday). Refresh Wednesday morning
# UTC, plus manual trigger for testing or off-cycle refreshes.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * WED'   # 11:00 UTC Wed = 06:00/07:00 ET

permissions:
  contents: write            # the job commits refreshed data/*.json

concurrency:
  group: lnm-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse LNM for all AORs
        run: python lnm_aor.py --all --out data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes this week."
          else
            git commit -m "data: weekly LNM AOR refresh"
            git push
          fi
